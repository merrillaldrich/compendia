<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 24">
  <defs>
    <style>
      .st0 {
        fill: #a0a0a0;
      }

      .st1 {
        fill: silver;
      }

      .st2 {
        fill: none;
        stroke: #888;
        stroke-linecap: square;
        stroke-width: 2px;
      }
    </style>
  </defs>
  <!-- Pin head -->
  <circle class="st0" cx="20" cy="9" r="6"/>
  <!-- Pin tail -->
  <polygon class="st0" points="15,12 25,12 20,21"/>
  <!-- Inner hole -->
  <circle class="st1" cx="20" cy="9" r="2.5"/>
</svg>
