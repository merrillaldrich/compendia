<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 64">
  <g opacity="0.32">
    <!-- Funnel body: symmetrical trapezoid, wide at top, narrow at bottom -->
    <polygon points="4,8 56,8 38,40 22,40" fill="#999"/>
    <!-- Spout: rectangle centered below trapezoid -->
    <rect x="22" y="40" width="16" height="18" fill="#888"/>
  </g>
</svg>
